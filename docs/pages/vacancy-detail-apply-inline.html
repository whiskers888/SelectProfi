<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Vacancy Detail - Apply UX</title>

  <style>
    :root {
      --primary: #2563EB;
      --hover: #1D4ED8;
      --bg: #F8FAFC;
      --surface: #FFFFFF;
      --text: #0F172A;
      --text-secondary: #64748B;
      --border: #E2E8F0;
      --success: #16A34A;
    }

    body {
      margin: 0;
      font-family: Inter, sans-serif;
      background: var(--bg);
    }

    .app {
      display: flex;
      height: 100vh;
    }

    /* SIDEBAR */

    .sidebar {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 16px;
    }

    .nav-item {
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 4px;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .nav-item.active {
      background: #EFF6FF;
      color: var(--primary);
    }

    /* MAIN */

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .header {
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    /* CONTENT */

    .content {
      padding: 24px;
      max-width: 900px;
    }

    .back {
      color: var(--primary);
      cursor: pointer;
      margin-bottom: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .title {
      font-size: 22px;
      font-weight: 600;
    }

    .company {
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .meta {
      margin-top: 12px;
      display: flex;
      gap: 16px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .salary {
      margin-top: 16px;
      font-size: 18px;
      font-weight: 600;
    }

    .section {
      margin-top: 20px;
    }

    .section-title {
      font-weight: 600;
      margin-bottom: 6px;
    }

    .text {
      font-size: 14px;
      line-height: 1.5;
    }

    /* BUTTONS */

    .btn {
      height: 40px;
      padding: 0 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--hover);
    }

    .btn-secondary {
      background: #F1F5F9;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
    }

    /* APPLY */

    .apply {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .after-apply {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status {
      color: var(--success);
      font-size: 14px;
    }

    /* MESSAGE */

    .message-block textarea {
      width: 100%;
      height: 100px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      resize: none;
    }

    .message-actions {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
    }

  </style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="nav-item active">Заказы</div>
    <div class="nav-item">Кандидаты</div>
    <div class="nav-item">Отклики</div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <div class="header">
      <div>Детали заказа</div>
      <div>👤 Иван</div>
    </div>

    <div class="content">

      <div class="back">← Назад</div>

      <div class="card">

        <div class="title">Frontend Developer</div>
        <div class="company">Яндекс • Москва</div>

        <div class="meta">
          <span>Удаленно</span>
          <span>2 недели</span>
        </div>

        <div class="salary">150 000 ₽</div>

        <div class="section">
          <div class="section-title">Описание</div>
          <div class="text">
            Разработка интерфейсов на React и TypeScript.
          </div>
        </div>

        <!-- APPLY UX -->

        <div class="apply">

          <!-- DEFAULT -->
          <button class="btn btn-primary" id="applyBtn">
            Откликнуться
          </button>

          <!-- AFTER APPLY -->
          <div class="after-apply" id="afterApply" style="display:none;">
            <div class="status">✅ Отклик отправлен</div>

            <button class="btn btn-secondary" id="addMessageBtn">
              Добавить сопроводительное
            </button>
          </div>

          <!-- MESSAGE -->
          <div class="message-block" id="messageBlock" style="display:none;">

            <textarea id="message" placeholder="Напишите сообщение..."></textarea>

            <div class="message-actions">
              <button class="btn btn-ghost" id="insertPrev">
                Вставить из предыдущего
              </button>

              <button class="btn btn-primary" id="sendMessage">
                Отправить письмо
              </button>
            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>

<script>
  const applyBtn = document.getElementById("applyBtn");
  const afterApply = document.getElementById("afterApply");
  const addMessageBtn = document.getElementById("addMessageBtn");
  const messageBlock = document.getElementById("messageBlock");
  const insertPrev = document.getElementById("insertPrev");
  const textarea = document.getElementById("message");
  const sendMessage = document.getElementById("sendMessage");

  let lastMessage = localStorage.getItem("lastMessage") || 
    "Здравствуйте! Рассматриваю вашу вакансию.";

  // быстрый отклик
  applyBtn.onclick = () => {
    applyBtn.style.display = "none";
    afterApply.style.display = "flex";
  };

  // открыть поле
  addMessageBtn.onclick = () => {
    messageBlock.style.display = "block";
  };

  // вставить прошлое
  insertPrev.onclick = () => {
    textarea.value = lastMessage;
  };

  // отправка письма
  sendMessage.onclick = () => {
    lastMessage = textarea.value;
    localStorage.setItem("lastMessage", lastMessage);
    alert("Письмо отправлено ✅");
  };
</script>

</body>
</html>

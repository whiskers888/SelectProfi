<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Input Component</title>

  <style>
    :root {
      --primary: #2563EB;
      --primary-hover: #1D4ED8;
      --bg: #F8FAFC;
      --text: #0F172A;
      --text-secondary: #64748B;
      --border: #E2E8F0;
      --error: #DC2626;
    }

    body {
      margin: 0;
      padding: 40px;
      font-family: Inter, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .label {
      font-size: 14px;
      font-weight: 500;
    }

    .input-wrapper {
      position: relative;
    }

    .input {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 14px;
      transition: all 0.18s ease;
      outline: none;
    }

    /* states */

    .input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
    }

    .input::placeholder {
      color: var(--text-secondary);
    }

    .input:disabled {
      background: #F1F5F9;
      cursor: not-allowed;
    }

    /* error */

    .field.error .input {
      border-color: var(--error);
    }

    .error-text {
      font-size: 12px;
      color: var(--error);
    }

    .helper-text {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* icon */

    .icon {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--text-secondary);
      pointer-events: none;
    }

  </style>
</head>

<body>

  <h2>Input fields</h2>

  <div class="container">

    <!-- default -->
    <div class="field">
      <label class="label">Email</label>
      <div class="input-wrapper">
        <input class="input" placeholder="you@example.com" />
      </div>
    </div>

    <!-- with helper -->
    <div class="field">
      <label class="label">Пароль</label>
      <div class="input-wrapper">
        <input class="input" type="password" placeholder="Введите пароль" />
      </div>
      <div class="helper-text">Минимум 8 символов</div>
    </div>

    <!-- error -->
    <div class="field error">
      <label class="label">Телефон</label>
      <div class="input-wrapper">
        <input class="input" value="123" />
      </div>
      <div class="error-text">Введите корректный номер</div>
    </div>

    <!-- disabled -->
    <div class="field">
      <label class="label">Компания</label>
      <div class="input-wrapper">
        <input class="input" value="Google" disabled />
      </div>
    </div>

    <!-- with icon -->
    <div class="field">
      <label class="label">Поиск вакансий</label>
      <div class="input-wrapper">
        <input class="input" placeholder="Frontend developer..." />
        <span class="icon">🔍</span>
      </div>
    </div>

  </div>

  <script>
    // пример простой валидации
    const phoneInput = document.querySelector('.field.error .input');

    phoneInput.addEventListener('input', (e) => {
      const value = e.target.value;

      if (value.length > 5) {
        e.target.parentElement.parentElement.classList.remove('error');
      }
    });
  </script>

</body>
</html>

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=selectprofi;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres};SSL Mode=Disable
      ConnectionStrings__Redis: redis:6379
      ConnectionStrings__RabbitMq: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "${BACKEND_PORT:-5268}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: node:22
    working_dir: /workspace
    environment:
      FRONTEND_PORT: "5173"
      VITE_API_BASE_URL: /
      VITE_PROXY_TARGET: http://app:8080
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/workspace
      - frontend_node_modules:/workspace/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: selectprofi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d selectprofi" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
